name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: release-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  COREPACK_VERSION: "0.35.0"

jobs:
  release:
    name: Publish release
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        !startsWith(github.event.workflow_run.head_commit.message || '', 'chore(release):')
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Validate release tag ancestry
        shell: bash
        run: |
          set -euo pipefail
          latest_tag="$(git tag -l 'v*' --sort=-version:refname | head -n 1 || true)"
          if [[ -z "${latest_tag}" ]]; then
            echo "No existing v* tags found; continuing."
            exit 0
          fi
          if git merge-base --is-ancestor "${latest_tag}" HEAD; then
            echo "Latest tag ${latest_tag} is reachable from HEAD."
            exit 0
          fi
          echo "::error::Latest tag ${latest_tag} is not reachable from HEAD. Release tags are out of sync with branch history."
          echo "::error::Fix by re-aligning tags to this branch history before running semantic-release."
          exit 1

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: ".nvmrc"

      - name: Install pnpm
        run: |
          npm install -g "corepack@${COREPACK_VERSION}"
          corepack enable pnpm
          corepack install

      - name: Install dependencies
        run: pnpm ci

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
        shell: bash
        run: |
          if [[ -z "${GITHUB_TOKEN}" ]]; then
            echo "::error::RELEASE_BOT_TOKEN is required so release commits trigger CI."
            exit 1
          fi
          pnpm exec semantic-release --extends ./release.config.mjs
