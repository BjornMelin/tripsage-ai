name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: Deployment environment
        required: true
        type: string
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        type: choice
        options:
          - development
          - staging
          - production

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

env:
  PNPM_VERSION: "10.28.2"
  VERCEL_CLI_VERSION: "53.3.2"

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Select Vercel environment
        id: vercel_env
        shell: bash
        env:
          REQUESTED_ENVIRONMENT: ${{ inputs.environment }}
        run: |
          set -euo pipefail
          case "$REQUESTED_ENVIRONMENT" in
            production)
              echo "deploy_environment=production" >> "$GITHUB_OUTPUT"
              echo "name=production" >> "$GITHUB_OUTPUT"
              echo "prod_flag=--prod" >> "$GITHUB_OUTPUT"
              echo "skip_domain_flag=--skip-domain" >> "$GITHUB_OUTPUT"
              echo "promote_after_smoke=true" >> "$GITHUB_OUTPUT"
              ;;
            staging|development)
              echo "deploy_environment=$REQUESTED_ENVIRONMENT" >> "$GITHUB_OUTPUT"
              echo "name=preview" >> "$GITHUB_OUTPUT"
              echo "prod_flag=" >> "$GITHUB_OUTPUT"
              echo "skip_domain_flag=" >> "$GITHUB_OUTPUT"
              echo "promote_after_smoke=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unsupported deployment environment. Must be development, staging, or production."
              exit 1
              ;;
          esac

      - name: Validate required GitHub secrets
        shell: bash
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          missing=()
          for name in VERCEL_ORG_ID VERCEL_PROJECT_ID VERCEL_TOKEN; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            printf '::error::Missing required GitHub secret(s): %s\n' "${missing[*]}"
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: ".nvmrc"

      - name: Install package managers and Vercel CLI
        shell: bash
        run: npm install -g "pnpm@${PNPM_VERSION}" "vercel@${VERCEL_CLI_VERSION}"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          if node --input-type=module <<'NODE'
          import { readFileSync } from "node:fs";

          const gitSpecifier = /(?:git\+|github:)/i;
          const dependencySections = new Set([
            "dependencies",
            "devDependencies",
            "optionalDependencies",
            "peerDependencies",
          ]);

          const matches = [];
          const packageJson = JSON.parse(readFileSync("package.json", "utf8"));

          for (const section of dependencySections) {
            const dependencies = packageJson[section];
            if (!dependencies || typeof dependencies !== "object") continue;

            for (const [name, specifier] of Object.entries(dependencies)) {
              if (typeof specifier === "string" && gitSpecifier.test(specifier)) {
                matches.push(`package.json:${section}.${name}`);
              }
            }
          }

          const lockfile = readFileSync("pnpm-lock.yaml", "utf8");
          const stack = [];

          for (const line of lockfile.split(/\r?\n/)) {
            const match = line.match(/^(\s*)([^:#][^:]*):(?:\s+(.*))?$/);
            if (!match) continue;

            const [, indentText, rawKey, rawValue = ""] = match;
            const indent = indentText.length;
            while (stack.length > 0 && stack.at(-1).indent >= indent) stack.pop();

            const key = rawKey.trim().replace(/^['"]|['"]$/g, "");
            const value = rawValue.trim().replace(/^['"]|['"]$/g, "");
            const path = stack.map((entry) => entry.key);
            const inDependencySection = path.some((entry) =>
              dependencySections.has(entry)
            );
            const inPackagesSection = path.includes("packages");

            if (
              (inDependencySection && gitSpecifier.test(`${key} ${value}`)) ||
              (inPackagesSection && gitSpecifier.test(key))
            ) {
              matches.push(`pnpm-lock.yaml:${[...path, key].join(".")}`);
            }

            stack.push({ indent, key });
          }

          if (matches.length > 0) {
            for (const match of matches) console.error(match);
            process.exit(1);
          }
          NODE
          then
            :
          else
            echo "::error::Git dependencies detected. Configure pnpm allowBuilds/onlyBuiltDependencies for 10.26+ before deploying."
            exit 1
          fi
          pnpm install --frozen-lockfile

      - name: Create GitHub deployment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        id: deployment
        env:
          DEPLOY_ENVIRONMENT: ${{ steps.vercel_env.outputs.deploy_environment }}
        with:
          script: |
            const environment = process.env.DEPLOY_ENVIRONMENT;
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment,
              required_contexts: [],
              auto_merge: false,
              production_environment: environment === "production",
              transient_environment: environment !== "production",
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: "in_progress",
              description: `Vercel ${environment} deployment started`,
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

            core.setOutput("deployment_id", String(deployment.data.id));

      - name: Pull Vercel project configuration
        shell: bash
        env:
          VERCEL_ENVIRONMENT: ${{ steps.vercel_env.outputs.name }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          vercel pull --yes --environment="$VERCEL_ENVIRONMENT" --token="$VERCEL_TOKEN"

      - name: Verify production environment contract
        shell: bash
        env:
          DEPLOY_ENVIRONMENT: ${{ steps.vercel_env.outputs.deploy_environment }}
          VERCEL_ENVIRONMENT: ${{ steps.vercel_env.outputs.name }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          vercel env run -e "$VERCEL_ENVIRONMENT" -- pnpm deploy:check-env -- --environment "$DEPLOY_ENVIRONMENT"

      - name: Verify live infrastructure
        if: steps.vercel_env.outputs.deploy_environment == 'production'
        shell: bash
        env:
          VERCEL_ENVIRONMENT: ${{ steps.vercel_env.outputs.name }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          vercel env run -e "$VERCEL_ENVIRONMENT" -- pnpm ops infra check supabase
          vercel env run -e "$VERCEL_ENVIRONMENT" -- pnpm ops infra check upstash

      - name: Build Vercel output
        shell: bash
        env:
          PROD_FLAG: ${{ steps.vercel_env.outputs.prod_flag }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          build_args=(--token="$VERCEL_TOKEN")
          if [[ -n "$PROD_FLAG" ]]; then
            build_args=("$PROD_FLAG" "${build_args[@]}")
          fi
          vercel build "${build_args[@]}"

      - name: Deploy prebuilt output
        id: deploy
        shell: bash
        env:
          PROD_FLAG: ${{ steps.vercel_env.outputs.prod_flag }}
          SKIP_DOMAIN_FLAG: ${{ steps.vercel_env.outputs.skip_domain_flag }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          deploy_args=(--prebuilt --archive=tgz --yes --token="$VERCEL_TOKEN")
          if [[ -n "$PROD_FLAG" ]]; then
            deploy_args+=("$PROD_FLAG")
          fi
          if [[ -n "$SKIP_DOMAIN_FLAG" ]]; then
            deploy_args+=("$SKIP_DOMAIN_FLAG")
          fi
          deployment_url="$(vercel deploy "${deploy_args[@]}")"
          printf '%s\n' "$deployment_url"
          if [[ ! "$deployment_url" =~ ^https://[^[:space:]]+$ ]]; then
            echo "::error::Vercel CLI did not emit a deployment URL."
            exit 1
          fi
          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"

      - name: Run deployment smoke checks
        id: smoke
        shell: bash
        env:
          DEPLOY_ENVIRONMENT: ${{ steps.vercel_env.outputs.deploy_environment }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
        run: pnpm deploy:smoke -- --url "$DEPLOYMENT_URL" --environment "$DEPLOY_ENVIRONMENT"

      - name: Promote production deployment
        id: promote
        if: steps.vercel_env.outputs.promote_after_smoke == 'true'
        shell: bash
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel promote "$DEPLOYMENT_URL" --yes --timeout=5m --token="$VERCEL_TOKEN"

      - name: Write machine-readable deployment summary
        if: always()
        shell: bash
        env:
          DEPLOY_ENVIRONMENT: ${{ steps.vercel_env.outputs.deploy_environment }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          PROMOTE_AFTER_SMOKE: ${{ steps.vercel_env.outputs.promote_after_smoke }}
          PROMOTE_OUTCOME: ${{ steps.promote.outcome }}
          SMOKE_OUTCOME: ${{ steps.smoke.outcome }}
        run: |
          set -euo pipefail
          deploy_status="${DEPLOY_OUTCOME:-skipped}"
          smoke_status="skipped"
          case "${SMOKE_OUTCOME:-skipped}" in
            success) smoke_status="passed" ;;
            failure|cancelled) smoke_status="failed" ;;
            skipped) smoke_status="skipped" ;;
            *) smoke_status="unknown" ;;
          esac

          promote_required="$PROMOTE_AFTER_SMOKE"
          promote_status="skipped"
          promoted="false"
          if [[ "$promote_required" == "true" ]]; then
            case "${PROMOTE_OUTCOME:-skipped}" in
              success)
                promote_status="passed"
                promoted="true"
                ;;
              failure|cancelled) promote_status="failed" ;;
              skipped) promote_status="skipped" ;;
              *) promote_status="unknown" ;;
            esac
          fi

          status="verified"
          if [[ "$deploy_status" != "success" || "$smoke_status" != "passed" ]]; then
            status="failed"
          fi
          if [[ "$promote_required" == "true" && "$promote_status" != "passed" ]]; then
            status="failed"
          fi

          jq -n \
            --arg deploy_status "$deploy_status" \
            --arg environment "$DEPLOY_ENVIRONMENT" \
            --arg promote_required "$promote_required" \
            --arg promote_status "$promote_status" \
            --arg promoted "$promoted" \
            --arg sha "$GITHUB_SHA" \
            --arg smoke_status "$smoke_status" \
            --arg status "$status" \
            --arg url "$DEPLOYMENT_URL" \
            '{
              deploy: {status: $deploy_status},
              environment: $environment,
              promote: {required: ($promote_required == "true"), status: $promote_status},
              promoted: ($promoted == "true"),
              sha: $sha,
              smoke: {status: $smoke_status},
              status: $status,
              url: (if $url == "" then null else $url end)
            }' \
            > deployment-summary.json

      - name: Write deployment summary
        if: always()
        shell: bash
        env:
          DEPLOY_ENVIRONMENT: ${{ steps.vercel_env.outputs.deploy_environment }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
          VERCEL_ENVIRONMENT: ${{ steps.vercel_env.outputs.name }}
          WORKFLOW_RESULT: ${{ job.status }}
        run: |
          deployment_url="${DEPLOYMENT_URL:-not created}"
          {
            echo "## Vercel deployment"
            echo ""
            echo "- Environment: \`${DEPLOY_ENVIRONMENT:-unknown}\`"
            echo "- Vercel environment: \`${VERCEL_ENVIRONMENT:-unknown}\`"
            echo "- Deployment URL: $deployment_url"
            echo "- Workflow result: \`$WORKFLOW_RESULT\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload deployment summary
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: deployment-summary-${{ steps.vercel_env.outputs.deploy_environment }}
          path: deployment-summary.json
          if-no-files-found: ignore

      - name: Update GitHub deployment status
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        if: always() && steps.deployment.outputs.deployment_id != ''
        env:
          DEPLOYMENT_ID: ${{ steps.deployment.outputs.deployment_id }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
          JOB_STATUS: ${{ job.status }}
        with:
          script: |
            const jobStatus = process.env.JOB_STATUS;
            const deploymentUrl = process.env.DEPLOYMENT_URL;
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number(process.env.DEPLOYMENT_ID),
              state: jobStatus === "success" ? "success" : "failure",
              environment_url: deploymentUrl || undefined,
              description: `Vercel deployment ${jobStatus}`,
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              auto_inactive: jobStatus === "success",
            });
