packages:
  - "."
  - "!opensrc/**"
  - "!**/node_modules/**"

autoInstallPeers: false
pmOnFail: download

allowBuilds:
  esbuild: false
  msw: false
  sharp: true
  simple-git-hooks: true

minimumReleaseAge: 1440
minimumReleaseAgeStrict: true
blockExoticSubdeps: true
trustPolicy: no-downgrade
trustLockfile: false

packageExtensions:
  "@hookform/resolvers@*":
    dependencies:
      zod: ^4.4.3

peerDependencyRules:
  allowedVersions:
    "madge>typescript": "^6.0.0"
    "tailwindcss-animate>tailwindcss": "^4.0.0"

publicHoistPattern:
  - "*sharp*"
  - "*@tailwindcss/oxide*"

# Security and compatibility pins for transitive dependencies:
# amadeus>qs, axios, @ungap/structured-clone, brace-expansion, lodash-es, and
# undici keep patched transitive versions; mermaid and mermaid>uuid keep diagram
# rendering on the supported renderer/UUID line; postcss stays aligned with the
# Tailwind 4 stack.
overrides:
  "amadeus>qs": 6.15.2
  axios: 1.14.0
  "@ungap/structured-clone": 1.3.1
  brace-expansion: ">=5.0.6"
  lodash-es: 4.18.1
  mermaid: 11.15.0
  "mermaid>uuid": 11.1.1
  postcss: 8.5.15
  undici: 7.24.7
